name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quick-checks:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run quick test suite with coverage
        run: swift test --enable-code-coverage
